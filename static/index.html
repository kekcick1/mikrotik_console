<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mikrotik Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-a: #f8f5ee;
      --bg-b: #eaf4ef;
      --bg-c: #dff0f8;
      --ink: #1b2823;
      --muted: #60756b;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-soft: rgba(255, 255, 255, 0.74);
      --line: rgba(23, 40, 34, 0.14);
      --line-soft: rgba(23, 40, 34, 0.08);
      --ok: #2f9f63;
      --warn: #bd7f2c;
      --bad: #c74437;
      --accent: #177896;
      --accent-2: #48a8c7;
      --shadow: 0 22px 42px rgba(22, 35, 30, 0.14);
      --terminal-bg: #0e1512;
      --terminal-ink: #cff7e0;
      --terminal-line: rgba(102, 155, 125, 0.3);
    }

    body.dark {
      --bg-a: #0d1420;
      --bg-b: #161729;
      --bg-c: #0f2730;
      --ink: #edf3f8;
      --muted: #93a9b4;
      --surface: rgba(14, 22, 34, 0.86);
      --surface-soft: rgba(18, 31, 45, 0.76);
      --line: rgba(168, 188, 205, 0.23);
      --line-soft: rgba(168, 188, 205, 0.11);
      --ok: #72dda6;
      --warn: #f0bf75;
      --bad: #ff968a;
      --accent: #58bad3;
      --accent-2: #2d8aa8;
      --shadow: 0 26px 54px rgba(0, 0, 0, 0.45);
      --terminal-bg: #070d15;
      --terminal-ink: #d4efe4;
      --terminal-line: rgba(88, 147, 188, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(980px 520px at 0% -10%, rgba(255, 204, 136, 0.35) 0%, transparent 72%),
        radial-gradient(900px 540px at 100% 0%, rgba(98, 199, 201, 0.28) 0%, transparent 74%),
        linear-gradient(152deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
      background-attachment: fixed;
    }

    .auth-gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: min(480px, 96vw);
      background: linear-gradient(160deg, var(--surface), var(--surface-soft));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(14px);
      animation: rise .28s ease-out;
    }

    .app {
      max-width: 1680px;
      margin: 18px auto;
      padding: 0 18px 22px;
      display: none;
      animation: fade .28s ease-out;
    }

    .card {
      background: linear-gradient(165deg, var(--surface), var(--surface-soft));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .panel { padding: 14px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(95deg, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%);
    }

    h1, h2, h3 { margin: 0; }
    h1 { font-size: 1.35rem; line-height: 1.1; }
    h2 { font-size: 1.02rem; margin-bottom: 8px; }
    h3 { font-size: .9rem; color: var(--muted); font-weight: 500; }

    .muted { color: var(--muted); font-size: .9rem; }

    input, button, select, textarea {
      width: 100%;
      margin: 6px 0;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font: inherit;
      color: var(--ink);
      background: var(--surface-soft);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid color-mix(in srgb, var(--accent) 46%, transparent);
      outline-offset: 1px;
    }

    button {
      border: none;
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(100deg, var(--accent), var(--accent-2));
      transition: transform .12s ease, box-shadow .2s ease, filter .2s ease;
      box-shadow: 0 10px 20px rgba(19, 108, 131, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 12px 22px rgba(19, 108, 131, 0.35);
    }

    button:disabled {
      opacity: .52;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button.secondary {
      color: var(--ink);
      background: color-mix(in srgb, var(--surface) 80%, transparent);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .danger {
      background: linear-gradient(100deg, #cd4a3b, #ad2f22);
      box-shadow: 0 10px 20px rgba(175, 48, 35, 0.28);
    }

    .success {
      background: linear-gradient(100deg, #2aa260, #21824d);
      box-shadow: 0 10px 20px rgba(31, 129, 78, 0.28);
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .row > * { flex: 1 1 0; }
    .row .auto { flex: 0 0 auto; width: auto; }

    .sidebar-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .tab-btn {
      margin: 0;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      box-shadow: none;
      font-weight: 700;
    }

    .tab-btn.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(100deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 16px rgba(19, 108, 131, 0.25);
    }

    .tab-panel {
      display: block;
    }

    .device-list {
      display: grid;
      gap: 6px;
      max-height: min(56vh, 560px);
      overflow: auto;
      padding-right: 2px;
    }

    .device-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: var(--surface-soft);
      cursor: pointer;
      transition: border-color .2s ease, transform .14s ease, background .2s ease;
    }

    .device-item .muted {
      font-size: .82rem;
      line-height: 1.2;
    }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      color: var(--muted);
      font-size: .86rem;
    }

    .inline-check input[type="checkbox"] {
      width: auto;
      margin: 0;
      padding: 0;
    }

    .device-item:hover {
      transform: translateY(-1px);
      background: color-mix(in srgb, var(--surface-soft) 75%, var(--accent) 5%);
    }

    .device-item.active {
      border-color: color-mix(in srgb, var(--accent) 60%, #fff 40%);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .grid-main {
      display: grid;
      gap: 14px;
      grid-template-columns: 1.2fr .95fr;
      align-items: start;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-soft);
      max-height: 320px;
    }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      vertical-align: middle;
      font-size: .9rem;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: color-mix(in srgb, var(--surface) 78%, transparent);
      backdrop-filter: blur(8px);
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .ok { background: rgba(73, 203, 132, 0.18); color: var(--ok); }
    .warn { background: rgba(246, 176, 87, 0.2); color: var(--warn); }
    .bad { background: rgba(255, 119, 101, 0.2); color: var(--bad); }

    .terminal {
      border: 1px solid var(--terminal-line);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(73, 139, 120, 0.06), transparent 30%),
        var(--terminal-bg);
      color: var(--terminal-ink);
      padding: 11px;
      min-height: 190px;
      max-height: 320px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .84rem;
      white-space: pre-wrap;
    }

    .backup-list, .audit-list, .user-list {
      display: grid;
      gap: 8px;
      max-height: 255px;
      overflow: auto;
      padding-right: 2px;
    }

    .backup-bulk-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
      margin-top: 6px;
    }

    .bulk-item {
      border-left: 3px solid var(--line);
    }

    .bulk-filter-btn.active {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(100deg, var(--accent), var(--accent-2));
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px;
      background: var(--surface-soft);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .item-meta { font-size: .82rem; color: var(--muted); line-height: 1.3; }

    .ssh-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .78rem;
      color: var(--muted);
      background: var(--surface-soft);
      margin-right: auto;
    }

    .ssh-indicator::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--warn);
      box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
    }

    .ssh-indicator.active {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 45%, var(--line));
    }

    .ssh-indicator.active::before {
      background: var(--ok);
      box-shadow: 0 0 10px color-mix(in srgb, var(--ok) 50%, transparent);
    }

    .ssh-indicator.reconnect {
      color: var(--warn);
      border-color: color-mix(in srgb, var(--warn) 45%, var(--line));
    }

    .ssh-indicator.reconnect::before {
      background: var(--warn);
    }

    .status {
      margin-top: 8px;
      min-height: 20px;
      color: var(--muted);
      font-size: .9rem;
    }

    .diag-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .diag-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-soft);
      padding: 8px;
    }

    .diag-label {
      font-size: .78rem;
      color: var(--muted);
    }

    .diag-value {
      font-size: .92rem;
      font-weight: 700;
      margin-top: 2px;
      word-break: break-word;
    }

    .hidden { display: none !important; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 18, 0.6);
      backdrop-filter: blur(3px);
      z-index: 60;
    }

    .modal-card {
      position: fixed;
      z-index: 61;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(560px, 94vw);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: linear-gradient(165deg, var(--surface), var(--surface-soft));
      box-shadow: var(--shadow);
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      width: 100%;
    }

    .sidebar-card {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow: auto;
    }

    .dashboard > * {
      min-width: 0;
    }

    .content-stack {
      display: grid;
      gap: 16px;
      align-items: start;
      min-width: 0;
    }

    .content-columns {
      display: grid;
      gap: 14px;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, .75fr);
      align-items: start;
      min-width: 0;
    }

    .column-stack {
      display: grid;
      gap: 14px;
      align-items: start;
    }

    .users-compact {
      width: 100%;
      margin-left: 0;
    }

    .interfaces-card .table-wrap {
      max-height: 620px;
    }

    .interfaces-card th,
    .interfaces-card td {
      padding: 8px 10px;
      font-size: .86rem;
    }

    .content-columns > * {
      min-width: 0;
    }

    .scroll-area {
      max-height: 360px;
      overflow: auto;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--accent) 34%, transparent);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    @keyframes rise {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .navbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      background: linear-gradient(165deg, color-mix(in srgb, var(--surface) 92%, transparent), color-mix(in srgb, var(--surface-soft) 96%, transparent));
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      padding: 13px 16px;
      margin-bottom: 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .navbar-brand {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--accent);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 0 4px;
    }

    .navbar-sep {
      display: none;
    }

    .nav-items {
      display: flex;
      gap: 9px;
      flex-wrap: nowrap;
      align-items: center;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .nav-items::-webkit-scrollbar {
      height: 6px;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      flex: 0 0 auto;
      min-height: 42px;
      padding: 9px 13px;
      margin: 0;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: color-mix(in srgb, var(--surface-soft) 85%, transparent);
      box-shadow: none;
      font-weight: 700;
      font-size: .9rem;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
      white-space: nowrap;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 40%, var(--line));
      background: color-mix(in srgb, var(--surface) 80%, var(--accent) 8%);
      box-shadow: 0 8px 16px rgba(19, 108, 131, 0.14);
    }

    .nav-btn.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(105deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 18px rgba(19, 108, 131, 0.26);
    }

    .nav-icon {
      margin-right: 6px;
      font-size: 1rem;
    }

    .nav-right {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: nowrap;
      min-width: fit-content;
    }

    .nav-device-host {
      min-width: 320px;
      max-width: 480px;
    }

    .nav-device-host .device-selector {
      padding: 6px 10px;
      grid-template-columns: auto minmax(170px, 1fr) auto;
      gap: 8px;
      background: color-mix(in srgb, var(--surface-soft) 92%, transparent);
    }

    .nav-device-host .device-selector .muted {
      font-size: .78rem;
      white-space: nowrap;
    }

    .nav-device-host .device-selector .device-select-label {
      max-width: 160px;
    }

    .nav-user {
      font-size: .84rem;
      color: var(--muted);
      white-space: nowrap;
      padding: 0 4px;
      font-weight: 700;
    }

    .nav-small-btn {
      width: auto;
      min-height: 36px;
      padding: 8px 11px;
      margin: 0;
      border-radius: 9px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: color-mix(in srgb, var(--surface) 78%, transparent);
      box-shadow: none;
      font-weight: 700;
      font-size: .82rem;
      cursor: pointer;
      transition: transform .12s ease, border-color .2s ease, background .2s ease;
      white-space: nowrap;
    }

    .device-selector {
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 12px;
      background: color-mix(in srgb, var(--surface-soft) 88%, transparent);
    }

    .device-selector .device-select-dropdown {
      margin: 0;
    }

    .device-selector .device-select-label {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 11px;
      font-size: .82rem;
      color: var(--muted);
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .iface-toolbar {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .iface-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .iface-title-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .iface-actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
    }

    .iface-actions button {
      width: auto;
      margin: 0;
      min-height: 36px;
      padding: 8px 11px;
      font-size: .84rem;
    }

    .iface-row-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .iface-row-actions button {
      width: auto;
      margin: 0;
      min-height: 30px;
      padding: 6px 10px;
      font-size: .78rem;
    }

    .nav-small-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 40%, var(--line));
      background: color-mix(in srgb, var(--surface-soft) 85%, var(--accent) 6%);
      color: var(--ink);
      box-shadow: none;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: fade .28s ease-out;
    }

    #globalStatus {
      display: none;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 80;
      display: grid;
      gap: 8px;
      width: min(380px, calc(100vw - 24px));
      pointer-events: none;
    }

    .toast {
      border: 1px solid var(--line);
      border-left: 4px solid var(--ok);
      border-radius: 12px;
      padding: 10px 12px;
      background: linear-gradient(165deg, var(--surface), var(--surface-soft));
      color: var(--ink);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      font-size: .86rem;
      line-height: 1.35;
      animation: rise .18s ease-out;
    }

    .toast.error {
      border-left-color: var(--bad);
    }

    .toast.leaving {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .2s ease, transform .2s ease;
    }

    .grid-2 {
      display: grid;
      gap: 14px;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 14px;
      align-items: start;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: var(--surface-soft);
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: .8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .dev-status-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .dev-status-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: linear-gradient(160deg, color-mix(in srgb, var(--surface) 96%, transparent), var(--surface-soft));
      cursor: pointer;
      transition: transform .16s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .dev-status-card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 40%, var(--line));
      box-shadow: 0 12px 22px rgba(18, 80, 103, 0.15);
    }

    .dev-status-card.selected {
      border-color: color-mix(in srgb, var(--accent) 62%, #fff 38%);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 50%, transparent);
    }

    .dev-status-card.active {
      border-left: 4px solid var(--ok);
    }

    .dev-status-card.error {
      border-left: 4px solid var(--bad);
    }

    .dev-status-main {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .dev-status-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .dev-status-title {
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
    }

    .dev-status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 4px 9px;
      font-size: .74rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .dev-status-chip.active {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 50%, var(--line));
      background: rgba(55, 172, 112, 0.12);
    }

    .dev-status-chip.idle {
      color: var(--muted);
      border-color: var(--line);
      background: color-mix(in srgb, var(--surface-soft) 90%, transparent);
    }

    .dev-status-chip.error {
      color: var(--bad);
      border-color: color-mix(in srgb, var(--bad) 45%, var(--line));
      background: rgba(201, 74, 62, 0.12);
    }

    .dev-status-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: .77rem;
      color: var(--muted);
    }

    .dev-status-meta strong {
      color: var(--ink);
      font-size: .8rem;
      font-weight: 700;
      display: block;
      margin-top: 1px;
    }

    .dev-status-actions {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .dev-status-actions button {
      min-height: 34px;
      padding: 6px 8px;
      font-size: .78rem;
      margin: 0;
      width: 100%;
    }

    .dev-status-error {
      font-size: .74rem;
      color: var(--bad);
      margin-top: 2px;
      white-space: normal;
      word-break: break-word;
      line-height: 1.35;
      max-height: 40px;
      overflow: auto;
      padding-right: 2px;
    }

    @media (max-width: 1320px) {
      .content-columns {
        grid-template-columns: 1fr;
      }

      .sidebar-card {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .users-compact {
        width: 100%;
      }

      .navbar {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .navbar-brand {
        font-size: 1rem;
      }

      .nav-items {
        order: 2;
        overflow-x: auto;
      }

      .nav-right {
        order: 3;
        justify-content: flex-start;
        flex-wrap: wrap;
        min-width: 0;
      }

      .nav-device-host {
        min-width: min(520px, 100%);
        max-width: 100%;
        flex: 1 1 100%;
      }
    }

    @media (max-width: 1100px) {
      .dashboard { grid-template-columns: 1fr; }

      .stats-row {
        grid-template-columns: 1fr;
      }

      .dev-status-grid {
        grid-template-columns: 1fr;
      }

      .dev-status-meta {
        grid-template-columns: 1fr;
      }

      .nav-items {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }

      .device-selector {
        grid-template-columns: 1fr;
      }

      .device-selector .device-select-label {
        max-width: 100%;
        justify-self: start;
      }

      .iface-actions {
        width: 100%;
      }

      .iface-actions button {
        flex: 1 1 140px;
      }

      .nav-device-host .device-selector {
        grid-template-columns: 1fr;
      }

      .nav-device-host .device-selector .device-select-label {
        max-width: 100%;
        justify-self: start;
      }
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .toast-stack {
        right: 10px;
        left: 10px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <section id="authGate" class="auth-gate">
    <div class="auth-card">
      <h1>Mikrotik Console</h1>
      <div class="muted" style="margin-top:6px">Sign in to access your devices</div>
      <form id="loginForm" style="margin-top:12px">
        <input name="username" placeholder="Username" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>
      <div class="status" id="authStatus"></div>
    </div>
  </section>

  <main id="app" class="app">
    <nav id="navbar" class="navbar"></nav>
    <section id="page-dashboard" class="page"></section>
    <section id="page-devices" class="page"></section>
    <section id="page-interfaces" class="page"></section>
    <section id="page-terminal" class="page"></section>
    <section id="page-backups" class="page"></section>
    <section id="page-admin" class="page"></section>
    <div id="globalStatus" class="status"></div>
  </main>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <div id="ifaceEditBackdrop" class="modal-backdrop hidden"></div>
  <section id="ifaceEditModal" class="modal-card hidden">
    <h2 style="margin-bottom:8px">Edit Interface</h2>
    <div class="muted" id="ifaceEditCurrent" style="margin-bottom:4px">-</div>
    <input id="ifaceEditNewName" placeholder="New name (optional)" />
    <input id="ifaceEditMtu" type="number" min="68" max="65535" placeholder="MTU (optional)" />
    <textarea id="ifaceEditComment" rows="3" placeholder="Comment (optional)"></textarea>
    <div class="row" style="margin-top:8px">
      <button id="ifaceEditSave" type="button">Save Changes</button>
      <button id="ifaceEditCancel" class="secondary" type="button">Cancel</button>
    </div>
  </section>

  <div id="pwModalBackdrop" class="modal-backdrop hidden"></div>
  <section id="pwModalCard" class="modal-card hidden">
    <h2 style="margin-bottom:6px">Change Password</h2>
    <div class="muted" id="pwModalFor" style="margin-bottom:10px"></div>
    <input id="pwModalPass" type="password" placeholder="New password (min 6 chars)" />
    <input id="pwModalConfirm" type="password" placeholder="Confirm new password" style="margin-top:8px" />
    <div class="row" style="margin-top:8px">
      <button id="pwModalSave" type="button">Save</button>
      <button id="pwModalCancel" class="secondary" type="button">Cancel</button>
    </div>
    <div id="pwModalStatus" class="status"></div>
  </section>

<script src="/static/js/app-core.js?v=20260405h"></script>
<script src="/static/js/pages/dashboard.js?v=20260405h"></script>
<script src="/static/js/pages/devices.js?v=20260405h"></script>
<script src="/static/js/pages/tools.js?v=20260405h"></script>
<script src="/static/js/app-init.js?v=20260405h"></script>
</body>
</html>
